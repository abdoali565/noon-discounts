<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>كود خصم نون السعودية الشامل</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    -webkit-tap-highlight-color: transparent;
  }
  
  body {
    background-color: #FEEE00;
    font-family: 'Cairo', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 15px;
    overflow-x: hidden; 
    overflow-y: auto;   
    position: relative;
  }

  .bg-glow-effect {
    position: absolute;
    width: 140%;
    height: 140%;
    background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(254,238,0,0) 70%);
    top: -20%;
    left: -20%;
    z-index: 1;
    animation: floatingGlow 8s infinite alternate ease-in-out;
    pointer-events: none;
  }

  @keyframes floatingGlow {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(20px, -20px) scale(1.15); }
  }

  .promo-card {
    background: rgba(255, 255, 255, 0.98);
    border: 4px solid #000000;
    border-radius: 32px;
    padding: 40px 22px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25);
    z-index: 2;
    position: relative;
    margin-bottom: 30px;
  }

  .text-logo-wrapper {
    margin: 10px auto 25px auto;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .logo-en {
    font-size: 42px;
    font-weight: 900;
    background: #000000;
    color: #FEEE00;
    padding: 2px 16px;
    border-radius: 12px;
    line-height: 1.1;
  }

  .logo-ar {
    font-size: 38px;
    font-weight: 900;
    color: #000000;
    line-height: 1.1;
  }

  .target-countries {
    font-size: 14px;
    color: #111111;
    font-weight: 900;
    margin-bottom: 25px;
    background: #FEEE00;
    display: inline-block;
    padding: 4px 14px;
    border-radius: 50px;
    border: 2px solid #000000;
  }

  .coupon-box-wrapper {
    background: #000000;
    color: #ffffff;
    border-radius: 20px;
    padding: 25px 15px;
    margin-bottom: 25px;
    border: 3px dashed #FEEE00;
    position: relative;
  }

  .box-info-text {
    font-size: 13px;
    color: #FEEE00;
    font-weight: 700;
    margin-bottom: 8px;
    display: block;
  }

  .main-code {
    font-size: 54px;
    font-weight: 900;
    letter-spacing: 4px;
    color: #ffffff;
    display: block;
    animation: neonPulse 1.4s infinite alternate ease-in-out;
  }

  @keyframes neonPulse {
    0% { text-shadow: 0 0 5px #fff, 0 0 10px #FEEE00; transform: scale(0.97); }
    100% { text-shadow: 0 0 15px #fff, 0 0 30px #FEEE00; transform: scale(1.03); }
  }

  .interactive-btn {
    font-family: 'Cairo', sans-serif;
    display: block;
    width: 100%;
    padding: 18px 20px;
    margin-bottom: 15px;
    border: 3px solid #000000;
    border-radius: 18px;
    font-size: 20px;
    font-weight: 900;
    cursor: pointer;
    text-decoration: none;
    box-sizing: border-box;
    position: relative;
    z-index: 5;
  }

  .btn-action-copy {
    background: #FEEE00;
    color: #000000;
    box-shadow: 0 6px 0 #000000;
  }
  .btn-action-copy:active {
    transform: translateY(6px);
    box-shadow: none;
  }

  .btn-action-go {
    background: #000000;
    color: #ffffff;
    box-shadow: 0 6px 0 #444444;
    font-size: 18px;
  }
  .btn-action-go:active {
    transform: translateY(6px);
    box-shadow: none;
  }

  .tech-title {
    font-size: 13px;
    color: #555555;
    font-weight: 700;
    margin: 25px 0 12px 0;
  }

  .tech-categories {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tech-categories span {
    background: #000000;
    color: #ffffff;
    padding: 8px 14px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    border: 2px solid #FEEE00;
  }

  /* عنصر تأثير قصاصات الورق المتطايرة */
  .confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    background-color: #f00;
    border-radius: 50%;
    z-index: 999;
    pointer-events: none;
    animation: fly 1.2s ease-out forwards;
  }

  @keyframes fly {
    0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--x), var(--y)) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="bg-glow-effect"></div>

<div class="promo-card">

  <div class="text-logo-wrapper">
    <div class="logo-en">noon</div>
    <div class="logo-ar">نون</div>
  </div>

  <div class="target-countries">عروض المملكة العربية السعودية الحصرية</div>

  <div class="coupon-box-wrapper">
    <span class="box-info-text">كود الخصم الفعال لجميع المنتجات والمقاضي</span>
    <span class="main-code" id="targetCode">KO77</span>
  </div>

  <button class="interactive-btn btn-action-copy" id="copyTrigger" onclick="executeSmartCopy()">اضغط لنسخ الكود</button>
  
  <a href="https://www.noon.com/saudi-ar" target="_blank" class="interactive-btn btn-action-go">التوجه للمتجر وتطبيق الخصم</a>

  <p class="tech-title">كود واحد يخصم على كل أقسام نون:</p>
  <div class="tech-categories">
    <span>👗 أزياء وملابس</span>
    <span>🧴 عطور وتجميل</span>
    <span>🛒 سوبرماركت</span>
    <span>🧸 ألعاب أطفال</span>
  </div>
</div>

<script>
function playCelebrationSound() {
  const context = new (window.AudioContext || window.webkitAudioContext)();
  
  // النغمة الأولى
  const osc1 = context.createOscillator();
  const gain1 = context.createGain();
  osc1.connect(gain1);
  gain1.connect(context.destination);
  osc1.type = 'sine';
  osc1.frequency.setValueAtTime(523.25, context.currentTime); // نغمة C5
  gain1.gain.setValueAtTime(0.3, context.currentTime);
  gain1.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.15);
  osc1.start();
  osc1.stop(context.currentTime + 0.15);

  // النغمة الحماسية الثانية مباشرة بعدها
  setTimeout(() => {
    const osc2 = context.createOscillator();
    const gain2 = context.createGain();
    osc2.connect(gain2);
    gain2.connect(context.destination);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(659.25, context.currentTime); // نغمة E5
    gain2.gain.setValueAtTime(0.3, context.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.3);
    osc2.start();
    osc2.stop(context.currentTime + 0.3);
  }, 100);
}

function createConfetti() {
  const colors = ['#FEEE00', '#000000', '#FF2E93', '#FF8A00', '#00E4FF', '#4CAF50'];
  for (let i = 0; i < 60; i++) {
    const confetti = document.createElement('div');
    confetti.classList.add('confetti');
    
    // حساب اتجاهات عشوائية متفجرة من وسط الزر لشاشة كاملة
    const x = (Math.random() - 0.5) * 350 + 'px';
    const y = (Math.random() - 0.7) * 400 + 'px';
    confetti.style.setProperty('--x', x);
    confetti.style.setProperty('--y', y);
    
    // ألوان وتوزيع عشوائي
    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.left = '50%';
    confetti.style.top = '50%';
    
    document.querySelector('.promo-card').appendChild(confetti);
    
    // إزالة العنصر بعد انتهاء التأثير
    setTimeout(() => { confetti.remove(); }, 1200);
  }
}

function executeSmartCopy() {
  const codeValue = "KO77";
  const copyButton = document.getElementById("copyTrigger");
  
  // تشغيل التأثير الصوتي والبصري البرميوم فوراً عند الضغط
  try {
    playCelebrationSound();
    createConfetti();
  } catch(e) {}

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(codeValue).then(() => {
      triggerSuccessState(copyButton);
    }).catch(() => {
      executeFallbackCopy(codeValue, copyButton);
    });
  } else {
    executeFallbackCopy(codeValue, copyButton);
  }
}

function executeFallbackCopy(text, button) {
  const dummyTextArea = document.createElement("textarea");
  dummyTextArea.value = text;
  dummyTextArea.style.position = "fixed"; 
  dummyTextArea.style.opacity = "0";
  document.body.appendChild(dummyTextArea);
  dummyTextArea.focus();
  dummyTextArea.select();
  
  try {
    const success = document.execCommand('copy');
    if (success) {
      triggerSuccessState(button);
    } else {
      alert("انسخ الكود: " + text);
    }
  } catch (err) {
    alert("انسخ الكود: " + text);
  }
  document.body.removeChild(dummyTextArea);
}

function triggerSuccessState(btn) {
  btn.innerText = "تم النسخ بنجاح! ✅";
  btn.style.backgroundColor = "#4CAF50"; 
  btn.style.color = "#ffffff";
  btn.style.borderColor = "#4CAF50";
  btn.style.boxShadow = "0 6px 0 #2E7D32";
  
  setTimeout(() => {
    btn.innerText = "اضغط لنسخ الكود";
    btn.style.backgroundColor = "#FEEE00";
    btn.style.color = "#000000";
    btn.style.borderColor = "#000000";
    btn.style.boxShadow = "0 6px 0 #000000";
  }, 2500);
}
</script>

</body>
</html>
