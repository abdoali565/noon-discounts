<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أقوى كود خصم نون السعودية الحصري</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
<style>
  /* إعدادات الصفحة والسماح بالتمرير البصري السلس */
  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    -webkit-tap-highlight-color: transparent;
  }
  
  body {
    background-color: #FEEE00; /* لون أصفر نون الرسمي */
    font-family: 'Cairo', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start; /* يسمح ببدء المحتوى من الأعلى لسهولة التمرير */
    min-height: 100vh;
    padding: 40px 20px;
    overflow-y: auto; /* تفعيل السكرول العمودي بشكل ذكي */
    position: relative;
  }

  /* تأثير الهالة الضوئية المتحركة في الخلفية لعمق بصري متطور */
  .bg-glow-effect {
    position: absolute;
    width: 140%;
    height: 140%;
    background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(254,238,0,0) 70%);
    top: -20%;
    left: -20%;
    z-index: 1;
    animation: floatingGlow 8s infinite alternate ease-in-out;
    pointer-events: none;
  }

  @keyframes floatingGlow {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(30px, -30px) scale(1.2); }
  }

  /* حاوية التصميم بستايل الـ Glassmorphism العصري */
  .promo-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 4px solid #000000;
    border-radius: 32px;
    padding: 40px 24px;
    width: 100%;
    max-width: 365px;
    text-align: center;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25);
    z-index: 2;
    position: relative;
    margin-bottom: 20px; /* مسافة أمان عند التمرير لأسفل */
  }

  /* حاوية لوجو نون الرسمي المرفوع */
  .logo-container {
    width: 140px;
    height: auto;
    margin: 0 auto 15px auto;
    display: block;
    animation: fadeInLogo 1s ease-out;
  }
  
  .logo-container img {
    width: 100%;
    height: auto;
    object-fit: contain;
  }

  @keyframes fadeInLogo {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .target-countries {
    font-size: 15px;
    color: #111111;
    font-weight: 900;
    margin-bottom: 30px;
    background: #FEEE00;
    display: inline-block;
    padding: 4px 16px;
    border-radius: 50px;
    border: 2px solid #000000;
  }

  /* مستطيل الكوبون الإبداعي المتوهج بالنيون التكنولوجي */
  .coupon-box-wrapper {
    background: #000000;
    color: #ffffff;
    border-radius: 20px;
    padding: 25px 15px;
    margin-bottom: 30px;
    border: 3px dashed #FEEE00;
    position: relative;
    box-shadow: inset 0 0 20px rgba(254,238,0,0.5), 0 15px 30px rgba(0,0,0,0.2);
  }

  /* الدوائر الجانبية للكوبون */
  .coupon-box-wrapper::before, .coupon-box-wrapper::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    background: #FEEE00;
    border: 3px solid #000000;
    border-radius: 50%;
    top: 50%;
    transform: translateY(-50%);
  }
  .coupon-box-wrapper::before { left: -12px; }
  .coupon-box-wrapper::after { right: -12px; }

  .box-info-text {
    font-size: 13px;
    color: #FEEE00;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 8px;
    display: block;
  }

  /* تأثير نبض وتوهج كود KO77 الحماسي */
  .main-code {
    font-size: 52px;
    font-weight: 900;
    letter-spacing: 4px;
    color: #ffffff;
    display: block;
    animation: neonPulse 1.5s infinite alternate ease-in-out;
  }

  @keyframes neonPulse {
    0% { text-shadow: 0 0 5px #fff, 0 0 10px #FEEE00; transform: scale(0.98); }
    100% { text-shadow: 0 0 15px #fff, 0 0 30px #FEEE00; transform: scale(1.02); }
  }

  /* الأزرار التفاعلية ثلاثية الأبعاد 3D */
  .interactive-btn {
    font-family: 'Cairo', sans-serif;
    display: block;
    width: 100%;
    padding: 18px 20px;
    margin-bottom: 16px;
    border: 3px solid #000000;
    border-radius: 18px;
    font-size: 20px;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.1s ease, background-color 0.3s ease;
    text-decoration: none;
    box-sizing: border-box;
  }

  /* زر النسخ التفاعلي (أصفر نون) */
  .btn-action-copy {
    background: #FEEE00;
    color: #000000;
    box-shadow: 0 6px 0 #000000;
  }
  .btn-action-copy:active {
    transform: translateY(6px);
    box-shadow: none;
  }

  /* زر التوجه المباشر للمتجر (أسود ملكي) */
  .btn-action-go {
    background: #000000;
    color: #ffffff;
    box-shadow: 0 6px 0 #444444;
    font-size: 18px;
  }
  .btn-action-go:active {
    transform: translateY(6px);
    box-shadow: none;
  }

  /* تصنيفات المنتجات والأجهزة الذكية المضافة بوضوح وتنسيق ممتاز */
  .tech-title {
    font-size: 13px;
    color: #666666;
    font-weight: 700;
    margin: 25px 0 10px 0;
    text-transform: uppercase;
  }

  .tech-categories {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tech-categories span {
    background: #000000;
    color: #ffffff;
    padding: 8px 14px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    border: 2px solid #FEEE00;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    animation: itemsUp 0.5s ease-out;
  }

  @keyframes itemsUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="bg-glow-effect"></div>

<div class="promo-card">
  
  <div class="logo-container">
    <svg viewBox="0 0 395 140" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M49.2 121.6C20.8 121.6 0 99.2 0 64.4C0 29.6 20.8 7.19995 49.2 7.19995C72.8 7.19995 91.2 22.8 96.4 46.4H74.4C70.4 33.2 59.6 26.4 48.8 26.4C33.6 26.4 22.4 41.6 22.4 64.4C22.4 87.2 33.6 102.4 48.8 102.4C60 102.4 70.4 95.2 74.4 82.4H96.4C91.2 106 72.8 121.6 49.2 121.6Z" fill="black"/>
      <path d="M149.2 119.2C118.8 119.2 96.8 95.2 96.8 63.2C96.8 31.2 118.8 7.19995 149.2 7.19995C179.6 7.19995 201.6 31.2 201.6 63.2C201.6 95.2 179.6 119.2 149.2 119.2ZM149.2 26.4C132.8 26.4 120 41.6 120 63.2C120 84.8 132.8 100 149.2 100C165.6 100 178.4 84.8 178.4 63.2C178.4 41.6 165.6 26.4 149.2 26.4Z" fill="black"/>
      <path d="M254.8 119.2C224.4 119.2 202.4 95.2 202.4 63.2C202.4 31.2 224.4 7.19995 254.8 7.19995C285.2 7.19995 307.2 31.2 307.2 63.2C307.2 95.2 285.2 119.2 254.8 119.2ZM254.8 26.4C238.4 26.4 225.6 41.6 225.6 63.2C225.6 84.8 238.4 100 254.8 100C271.2 100 284 84.8 284 63.2C284 41.6 271.2 26.4 254.8 26.4Z" fill="black"/>
      <path d="M312.4 116.8V10.3999H333.6V26C341.2 13.6 354 7.19995 370.4 7.19995C388.4 7.19995 394.8 18.4 394.8 38.8V116.8H373.2V44.4C373.2 32.8 367.6 26.4 356.4 26.4C344 26.4 334 35.6 334 52.8V116.8H312.4Z" fill="black"/>
    </svg>
  </div>

  <div class="target-countries">🇸🇦 عروض المملكة العربية السعودية الحصرية</div>

  <div class="coupon-box-wrapper">
    <span class="box-info-text">كود الخصم الفعال للأجهزة والالكترونيات</span>
    <span class="main-code" id="targetCode">KO77</span>
  </div>

  <button class="interactive-btn btn-action-copy" id="copyTrigger" onclick="executeSmartCopy()">اضغط لنسخ الكود 📋</button>
  
  <a href="https://www.noon.com/saudi-ar" target="_blank" class="interactive-btn btn-action-go">التوجه للمتجر وتطبيق الخصم 🛍️</a>

  <p class="tech-title">يشمل الخصم الأجهزة التالية:</p>
  <div class="tech-categories">
    <span>📱 جوالات ذكية</span>
    <span>🎧 إيربودز وسماعات</span>
    <span>⌚ ساعات ذكية</span>
    <span>💻 آيباد وتابلت</span>
  </div>
</div>

<script>
function executeSmartCopy() {
  const codeValue = "KO77";
  const copyButton = document.getElementById("copyTrigger");

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(codeValue).then(() => {
      triggerSuccessState(copyButton);
    }).catch(() => {
      executeFallbackCopy(codeValue, copyButton);
    });
  } else {
    executeFallbackCopy(codeValue, copyButton);
  }
}

function executeFallbackCopy(text, button) {
  const dummyTextArea = document.createElement("textarea");
  dummyTextArea.value = text;
  dummyTextArea.style.position = "fixed"; 
  dummyTextArea.style.opacity = "0";
  document.body.appendChild(dummyTextArea);
  dummyTextArea.focus();
  dummyTextArea.select();
  
  try {
    const success = document.execCommand('copy');
    if (success) {
      triggerSuccessState(button);
    } else {
      alert("انسخ الكود يدويًا: " + text);
    }
  } catch (err) {
    alert("انسخ الكود يدويًا: " + text);
  }
  document.body.removeChild(dummyTextArea);
}

function triggerSuccessState(btn) {
  btn.innerText = "تم النسخ بنجاح! ✅";
  btn.style.backgroundColor = "#4CAF50"; 
  btn.style.color = "#ffffff";
  btn.style.borderColor = "#4CAF50";
  btn.style.boxShadow = "0 6px 0 #2E7D32";
  
  setTimeout(() => {
    btn.innerText = "اضغط لنسخ الكود 📋";
    btn.style.backgroundColor = "#FEEE00";
    btn.style.color = "#000000";
    btn.style.borderColor = "#000000";
    btn.style.boxShadow = "0 6px 0 #000000";
  }, 2500);
}
</script>

</body>
</html>
